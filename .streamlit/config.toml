# Streamlit theme — implements docs/design/ui-spec.md (Data-Dense Dashboard, WCAG-AA tuned).
[theme]
base = "light"
primaryColor = "#1E40AF"
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#E9EEF6"
textColor = "#1E3A8A"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false

name: CI

# Quality-gate-then-build topology (mirrors the reference pipeline, mapped to Python):
#   Format · Lint · Types · Test  →  Quality Gate  →  Build  →  E2E  →  Deploy (TODO)
# Reference PHP/JS jobs → Python equivalents:
#   Pint→ruff format · ESLint→ruff check · PHPStan/TypeScript→mypy · Pest→pytest
#   Quality Gate→bandit+pip-audit+detect-secrets · Build(Vite+SSR)→pip install+import smoke
#   Playwright→Playwright vs Streamlit · Deploy→placeholder

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Format (ruff format) — analog of "PHP Format (Pint)" / Prettier ──────────
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install ruff
      - run: ruff format --check .

  # ── Lint (ruff check) — analog of "ESLint" ───────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install ruff
      - run: ruff check --output-format=github .

  # ── Types (mypy) — analog of "PHPStan" + "TypeScript" ────────────────────────
  types:
    name: Types
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r requirements-dev.txt
      - run: mypy

  # ── Test (pytest) — analog of "Pest (backend)" ──────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r requirements-dev.txt
      - name: pytest (unit + integration)
        run: pytest -m "not slow and not llm and not e2e" --cov=src --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: coverage, path: coverage.xml, if-no-files-found: ignore }

  # ── Quality Gate — security + dependency + secrets (analog of "Quality Gate") ─
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [format, lint, types, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install "bandit[toml]" pip-audit detect-secrets
      - name: Bandit (SAST)
        run: bandit -c pyproject.toml -r src
      - name: detect-secrets (audit tracked files against baseline)
        run: git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline
      - name: pip-audit (dependency CVEs)
        run: pip-audit -r requirements.txt --strict || echo "::warning::pip-audit advisories — review"

  # ── Build — package builds + imports cleanly (analog of "Build (Vite + SSR)") ─
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install build
      - name: Build wheel/sdist
        run: python -m build
      - name: Import smoke (package loads)
        run: pip install -e . && python -c "import src; print('import OK')"

  # ── E2E (Playwright vs Streamlit) — analog of "Playwright (E2E)" ─────────────
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r requirements-dev.txt
      - run: python -m playwright install --with-deps chromium
      - name: Playwright E2E (skip cleanly until UI exists)
        run: |
          set +e
          pytest -m e2e
          code=$?
          if [ $code -eq 5 ]; then echo "no e2e tests collected yet — neutral pass"; exit 0; fi
          exit $code

  # ── Deploy (TODO) — placeholder, mirrors the reference "Deploy (TODO)" job ────
  deploy:
    name: Deploy (TODO)
    runs-on: ubuntu-latest
    needs: [e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Placeholder
        run: echo "Deploy not configured yet (research prototype). Add deployment target when needed."

name: Security

on:
  # Per-PR security runs in ci.yml's "Quality Gate" job; this is the deeper weekly sweep.
  schedule:
    - cron: "0 6 * * 1"   # weekly Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scan:
    name: Bandit · pip-audit · secrets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] pip-audit detect-secrets

      - name: Bandit (SAST)
        run: bandit -c pyproject.toml -r src

      - name: detect-secrets scan
        run: |
          detect-secrets scan --baseline .secrets.baseline
          git diff --exit-code .secrets.baseline || (echo "::error::New secrets detected — review .secrets.baseline" && exit 1)

      - name: pip-audit (dependency CVEs)
        run: pip-audit -r requirements.txt --strict || echo "::warning::pip-audit found advisories — review above"
